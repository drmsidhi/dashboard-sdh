<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jai Jawan Sidhi Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: "Nirmala UI", Arial;
  margin: 0;
  background: #eef2f7;
}

.header {
  background: linear-gradient(90deg, #FF9933, #ffffff, #138808);
  padding: 18px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

.subheader {
  text-align:center;
  margin-top:5px;
  font-size:14px;
}

.container {
  padding: 20px;
}

.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content: space-between;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 14px;
  flex:1;
  min-width:200px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card h2 {
  margin: 5px;
  color:#333;
}

.section {
  margin-top: 30px;
}

canvas {
  background:white;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
}

</style>

</head>

<body>

<div class="header">
🇮🇳 Jai Jawan Sidhi – Grievance Dashboard
</div>

<div class="subheader">
District Administration Sidhi | Soldier Welfare Monitoring System
</div>

<div class="container">

<div class="cards">
<div class="card">
<h3>Total Cases</h3>
<h2>15</h2>
</div>

<div class="card">
<h3>Land Issues</h3>
<h2>10</h2>
</div>

<div class="card">
<h3>Pending</h3>
<h2>9</h2>
</div>

<div class="card">
<h3>Resolved</h3>
<h2>6</h2>
</div>
</div>

<div class="section">
<h3>Force Distribution</h3>
<canvas id="forceChart"></canvas>
</div>

<div class="section">
<h3>Problem Type Analysis</h3>
<canvas id="problemChart"></canvas>
</div>

</div>

<script>

new Chart(document.getElementById("forceChart"), {
type: "pie",
data: {
labels: ["Army", "Navy"],
datasets: [{
data: [13, 2]
}]
}
});

new Chart(document.getElementById("problemChart"), {
type: "bar",
data: {
labels: ["Land Dispute", "Encroachment", "Fraud", "Way Dispute"],
datasets: [{
data: [8, 3, 2, 2]
}]
}
});

</script>

</body>
</html>
