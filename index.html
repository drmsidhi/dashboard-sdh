<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jai Jawan Sidhi Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: "Nirmala UI", Arial;
  margin: 0;
  background: #eef2f7;
}

.header {
  background: linear-gradient(90deg, #FF9933, #ffffff, #138808);
  padding: 18px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.filters {
  margin-bottom: 20px;
}

select {
  padding: 8px;
  margin-right: 10px;
}

.cards {
  display:flex;
  flex-wrap:wrap;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
  flex:1;
  min-width:200px;
  text-align: center;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

canvas {
  background:white;
  padding:10px;
  border-radius:12px;
  margin-top:20px;
}
</style>

</head>

<body>

<div class="header">
🇮🇳 Jai Jawan Sidhi Dashboard
</div>

<div class="container">

<div class="filters">
<select id="tehsilFilter" onchange="updateDashboard()">
<option value="All">All Tehsil</option>
<option>Sidhi</option>
<option>Majhauli</option>
<option>Churhat</option>
<option>Rampur Naikin</option>
</select>

<select id="problemFilter" onchange="updateDashboard()">
<option value="All">All Problems</option>
<option>Land Dispute</option>
<option>Encroachment</option>
<option>Fraud</option>
<option>Way Dispute</option>
</select>
</div>

<div class="cards">
<div class="card">
<h3>Total Cases</h3>
<h2 id="total">0</h2>
</div>

<div class="card">
<h3>Pending</h3>
<h2 id="pending">0</h2>
</div>

<div class="card">
<h3>Resolved</h3>
<h2 id="resolved">0</h2>
</div>
</div>

<canvas id="forceChart"></canvas> <canvas id="problemChart"></canvas>

</div>

<script>

// Sample Data (future में Excel से connect कर सकते हैं)
const data = [
{force:"Army", tehsil:"Sidhi", problem:"Land Dispute", status:"Pending"},
{force:"Army", tehsil:"Majhauli", problem:"Encroachment", status:"Resolved"},
{force:"Navy", tehsil:"Churhat", problem:"Fraud", status:"Pending"},
{force:"Army", tehsil:"Rampur Naikin", problem:"Way Dispute", status:"Pending"},
{force:"Army", tehsil:"Sidhi", problem:"Land Dispute", status:"Resolved"},
{force:"Army", tehsil:"Sidhi", problem:"Encroachment", status:"Pending"},
];

// Charts
let forceChart = new Chart(document.getElementById("forceChart"), {
type: "pie",
data: { labels: [], datasets: [{ data: [] }] }
});

let problemChart = new Chart(document.getElementById("problemChart"), {
type: "bar",
data: { labels: [], datasets: [{ data: [] }] }
});

function updateDashboard() {

let tehsil = document.getElementById("tehsilFilter").value;
let problem = document.getElementById("problemFilter").value;

let filtered = data.filter(d =>
(tehsil==="All" || d.tehsil===tehsil) &&
(problem==="All" || d.problem===problem)
);

// KPIs
document.getElementById("total").innerText = filtered.length;
document.getElementById("pending").innerText = filtered.filter(d=>d.status==="Pending").length;
document.getElementById("resolved").innerText = filtered.filter(d=>d.status==="Resolved").length;

// Force count
let forceCount = {};
filtered.forEach(d=>{
forceCount[d.force] = (forceCount[d.force] || 0) + 1;
});

// Problem count
let problemCount = {};
filtered.forEach(d=>{
problemCount[d.problem] = (problemCount[d.problem] || 0) + 1;
});

// Update charts
forceChart.data.labels = Object.keys(forceCount);
forceChart.data.datasets[0].data = Object.values(forceCount);
forceChart.update();

problemChart.data.labels = Object.keys(problemCount);
problemChart.data.datasets[0].data = Object.values(problemCount);
problemChart.update();
}

// Initial load
updateDashboard();

</script>

</body>
</html>
